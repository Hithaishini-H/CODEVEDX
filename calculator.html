<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Basic Calculator</title>
<style>
  * {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background: #2b2b3d;
  }

  .calculator {
    background: #1e1e2f;
    border-radius: 12px;
    padding: 20px;
    width: 280px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
  }

  #display {
    width: 100%;
    height: 60px;
    margin-bottom: 15px;
    border: none;
    border-radius: 8px;
    background: #11111c;
    color: #ffffff;
    font-size: 28px;
    text-align: right;
    padding: 0 15px;
  }

  /* CSS GRID for button alignment */
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .btn {
    padding: 18px 0;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    background: #3a3a55;
    color: #ffffff;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.1s ease;
  }

  .btn:hover {
    background: #50507a;
  }

  .btn:active {
    transform: scale(0.95);
  }

  .operator {
    background: #5e5e8a;
  }

  .equals {
    background: #ff8c42;
    grid-column: span 2;
  }

  .equals:hover {
    background: #ff9f5b;
  }
</style>
</head>
<body>

  <div class="calculator">
    <input type="text" id="display" disabled value="0">

    <div class="buttons">
      <button class="btn operator" data-value="C">C</button>
      <button class="btn operator" data-value="(">(</button>
      <button class="btn operator" data-value=")">)</button>
      <button class="btn operator" data-value="/">/</button>

      <button class="btn" data-value="7">7</button>
      <button class="btn" data-value="8">8</button>
      <button class="btn" data-value="9">9</button>
      <button class="btn operator" data-value="*">*</button>

      <button class="btn" data-value="4">4</button>
      <button class="btn" data-value="5">5</button>
      <button class="btn" data-value="6">6</button>
      <button class="btn operator" data-value="-">-</button>

      <button class="btn" data-value="1">1</button>
      <button class="btn" data-value="2">2</button>
      <button class="btn" data-value="3">3</button>
      <button class="btn operator" data-value="+">+</button>

      <button class="btn" data-value="0">0</button>
      <button class="btn" data-value=".">.</button>
      <button class="btn equals" data-value="=">=</button>
    </div>
  </div>

<script>
  const display = document.getElementById("display");
  const buttons = document.querySelectorAll(".btn");

  let currentInput = "";

  // Loop through every button and attach an event listener to each one
  for (let i = 0; i < buttons.length; i++) {
    buttons[i].addEventListener("click", function () {
      const value = buttons[i].getAttribute("data-value");
      handleInput(value);
    });
  }

  function handleInput(value) {
    // if-else statements to decide what each button press should do
    if (value === "C") {
      currentInput = "";
      display.value = "0";
    } else if (value === "=") {
      calculateResult();
    } else {
      // Prevent two operators being typed back to back, e.g. "5++3"
      const operators = ["+", "-", "*", "/"];
      const lastChar = currentInput.slice(-1);

      if (operators.includes(value) && operators.includes(lastChar)) {
        currentInput = currentInput.slice(0, -1) + value;
      } else {
        currentInput += value;
      }
      display.value = currentInput;
    }
  }

  function calculateResult() {
    try {
      // Only allow safe characters before evaluating
      if (!/^[0-9+\-*/().\s]+$/.test(currentInput)) {
        throw new Error("Invalid input");
      }

      const result = eval(currentInput);

      if (!isFinite(result)) {
        display.value = "Error";
        currentInput = "";
        return;
      }

      display.value = result;
      currentInput = String(result);
    } catch (error) {
      display.value = "Error";
      currentInput = "";
    }
  }

  // Allow keyboard input too
  document.addEventListener("keydown", function (event) {
    const key = event.key;

    if ((key >= "0" && key <= "9") || ["+", "-", "*", "/", "(", ")", "."].includes(key)) {
      handleInput(key);
    } else if (key === "Enter") {
      calculateResult();
    } else if (key === "Backspace") {
      currentInput = currentInput.slice(0, -1);
      display.value = currentInput === "" ? "0" : currentInput;
    } else if (key === "Escape") {
      handleInput("C");
    }
  });
</script>

</body>
</html>
